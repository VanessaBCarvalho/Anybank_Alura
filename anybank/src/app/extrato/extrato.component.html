<aside class="extrato">

  <div class="header">
    <h2 class="titulo">Extrato</h2>
    <span class="badge">{{ transacoes().length }} itens</span>
  </div>

  <ul class="transacoes">

    @for (transacao of transacoes(); track transacao.id) {
      <li class="item">
        <app-transacao [transacao]="transacao"></app-transacao>
      </li>
    } @empty {
      <li class="empty">
        Ainda não há transações.
      </li>
    }

  </ul>

</aside>
